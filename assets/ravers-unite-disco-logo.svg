<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ravers Unite disco ball logo</title>
  <desc id="desc">A colorful disco ball app icon for Ravers Unite.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="432" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
